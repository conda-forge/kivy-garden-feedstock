schema_version: 1

context:
  name: kivy-garden
  version: 0.1.4

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: c256f42788421273a08fbb0a228f0fb0e80dd86b629fb8c0920507f645be6c72

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - pip
    - requests

tests:
  - python:
      imports:
        - garden
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  license: MIT
  license_file: LICENSE
  summary: The kivy garden installation script, split into its own package for convenient use in buildozer.
  description: |
    The kivy garden installation script, split into its own package for
    convenient use in buildozer.
  homepage: https://github.com/kivy-garden/garden
  repository: https://github.com/kivy-garden/garden
  documentation: https://github.com/kivy-garden/garden

extra:
  recipe-maintainers:
    - jan-janssen
